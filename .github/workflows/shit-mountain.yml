name: 💩 屎山程式碼偵測

on:
  push:
    branches: [ main, master, dev/* ]
  pull_request:
    branches: [ main, master ]

jobs:
  shit-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v7
      
      - name: 下載 fuck-u-code
        run: |
          curl -L -o fuck-u-code \
            https://github.com/Done-0/fuck-u-code/releases/latest/download/fuck-u-code-linux-amd64
          chmod +x fuck-u-code

      - name: 執行屎山分析 & 詳細評分
        id: analyze
        run: |
          ./fuck-u-code analyze --verbose --lang zh-CN --top 10 2>&1 | tee analysis.log
          
          SCORE=$(grep -oP "总体评分:\s*\K[0-9.]+" analysis.log | head -1)
          if [ -z "$SCORE" ]; then SCORE="0"; fi
          
          echo "原始分數: $SCORE"
          
          # 11 檔精細等級（對標原始碼 QualityLevels）
          EMOJI=""
          STATUS=""
          COLOR=""
          DESC=""
          ADVICE=""
          ALLOW_MERGE="true"
          
          if (( $(echo "$SCORE < 5" | bc -l) )); then
            EMOJI="🌱"
            STATUS="清潔級"
            COLOR="brightgreen"
            DESC="程式碼潔癖者的朝聖地，可以直接拿去當教材"
            ADVICE="完美！繼續保持，甚至可以寫篇部落格炫耀一下"
            ALLOW_MERGE="true"
            echo "✨ 偵測結果：清潔級 — 這是藝術品，不是程式碼"
            
          elif (( $(echo "$SCORE < 15" | bc -l) )); then
            EMOJI="🌸"
            STATUS="微臭級"
            COLOR="green"
            DESC="略有異味，但開窗通風就散了，屬於可接受範圍"
            ADVICE="輕微瑕疵，順手重構一下即可"
            ALLOW_MERGE="true"
            echo "🌸 偵測結果：微臭級 — 空氣清新，略有花香"
            
          elif (( $(echo "$SCORE < 25" | bc -l) )); then
            EMOJI="😐"
            STATUS="中等混亂"
            COLOR="yellowgreen"
            DESC="程式碼到了青春期，有點叛逆，但還能管教"
            ADVICE="建議適當整理，別讓混亂累積"
            ALLOW_MERGE="true"
            echo "😐 偵測結果：中等混亂 — 青春期的程式碼，需要適當管教"
            
          elif (( $(echo "$SCORE < 40" | bc -l) )); then
            EMOJI="😷"
            STATUS="糟糕級"
            COLOR="yellow"
            DESC="需要戴口罩維護了，混亂度開始影響閱讀體驗"
            ADVICE="⚠️ 注意：建議近期安排重構計劃，別讓債務累積"
            ALLOW_MERGE="true"
            echo "😷 偵測結果：糟糕級 — 建議戴口罩閱讀"
            
          elif (( $(echo "$SCORE < 55" | bc -l) )); then
            if (( $(echo "$SCORE < 45" | bc -l) )); then
              SUB="輕度"
              DESC="屎山剛開始發酵，臭味初顯，但還能搶救"
            elif (( $(echo "$SCORE < 50" | bc -l) )); then
              SUB="中度"  
              DESC="屎山已經形成，開窗也救不了，建議謹慎維護"
            else
              SUB="重度"
              DESC="屎山重度污染，維護難度陡增，重構迫在眉睫"
            fi
            
            EMOJI="💩"
            STATUS="${SUB}屎山級"
            COLOR="orange"
            ADVICE="💡 **重點優化建議**：\n1. 優先拆分循環複雜度 >15 的函數\n2. 給 0 註解的函數補文件\n3. 考慮模組拆分，別讓檔案超過 500 行"
            ALLOW_MERGE="true"
            echo "💩 偵測結果：${SUB}屎山級(40-54 分檔) — 程式碼開始散發不可描述的氣味"
            
          elif (( $(echo "$SCORE < 65" | bc -l) )); then
            EMOJI="🤕"
            STATUS="災難級"
            COLOR="red"
            DESC="維護困難，每次改動都可能引發蝴蝶效應"
            ADVICE="🚨 **警告**：建議暫停功能開發，先還債\n- 重點關注循環複雜度 >20 的函數\n- 考慮重寫部分核心邏輯"
            ALLOW_MERGE="false"
            echo "::warning::🤕 偵測結果：災難級 — 維護像打副本，建議重構"
            
          elif (( $(echo "$SCORE < 75" | bc -l) )); then
            EMOJI="☣️"
            STATUS="嚴重災難"
            COLOR="#DC143C"
            DESC="難以維護，程式碼已成遺跡，只有考古學家能看懂"
            ADVICE="☣️ **嚴重警告**：建議大幅重構或重寫\n- 當前程式碼已產生高額技術債務\n- 新功能開發效率將極低"
            ALLOW_MERGE="false"
            echo "::warning::☣️ 偵測結果：嚴重災難級 — 程式碼已成遺跡"
            
          elif (( $(echo "$SCORE < 85" | bc -l) )); then
            EMOJI="🧟"
            STATUS="非常糟糕"
            COLOR="#8B0000"
            DESC="接近不可救藥，每次提交都是一次冒險"
            ADVICE="💀 **危險**：建議立即停止功能開發，全面重構\n- 考慮使用設計模式解耦\n- 建立完整的單元測試後再重構"
            ALLOW_MERGE="false"
            echo "::error::🧟 偵測結果：非常糟糕級 — 程式碼像殭屍，死而不僵"
            
          elif (( $(echo "$SCORE < 95" | bc -l) )); then
            EMOJI="☢️"
            STATUS="極端災難"
            COLOR="purple"
            DESC="完全失控，建議重寫而非重構"
            ADVICE="☢️ **極度危險**：建議廢棄當前實作，重寫比修復更划算"
            ALLOW_MERGE="false"
            echo "::error::☢️ 偵測結果：極端災難級 — 建議放棄治療"
            
          elif (( $(echo "$SCORE < 100" | bc -l) )); then
            EMOJI="🪦"
            STATUS="廢棄級"
            COLOR="#4B0082"
            DESC="已廢棄程式碼，僅供參觀警示後人"
            ADVICE="🪦 **墓誌銘級**：這段程式碼已經死了，建議立個墓碑然後重寫"
            ALLOW_MERGE="false"
            echo "::error::🪦 偵測結果：廢棄級 — 建議直接刪庫"
            
          else
            EMOJI="👑💩"
            STATUS="終極災難"
            COLOR="black"
            DESC="爛到極致，已超越人類理解範疇，建議申請文化遺產保護"
            ADVICE="👑💩 **神級屎山**：建議截圖留念，做成明信片警示後人，然後刪庫跑路"
            ALLOW_MERGE="false"
            echo "::error::👑💩 偵測結果：終極災難級 — 這是藝術品，建議送博物館"
          fi
          
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "emoji=$EMOJI" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT
          echo "desc=$DESC" >> $GITHUB_OUTPUT
          echo "advice=$ADVICE" >> $GITHUB_OUTPUT
          echo "allow_merge=$ALLOW_MERGE" >> $GITHUB_OUTPUT
          
          echo "### $EMOJI 屎山偵測摘要（11 檔精細版）" >> $GITHUB_STEP_SUMMARY
          echo "| 指標 | 數值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| **總體評分** | $SCORE / 100 |" >> $GITHUB_STEP_SUMMARY
          echo "| **屎山等級** | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| **等級描述** | $DESC |" >> $GITHUB_STEP_SUMMARY
          echo "| **合併建議** | $([ "$ALLOW_MERGE" == "true" ] && echo "✅ 允許" || echo "❌ 禁止") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**💡 優化建議**" >> $GITHUB_STEP_SUMMARY
          echo "$ADVICE" >> $GITHUB_STEP_SUMMARY

      # 在 PR 評論裡顯示詳細等級
      - name: PR 評論（氛圍版）
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const score = parseFloat('${{ steps.analyze.outputs.score }}');
            const status = '${{ steps.analyze.outputs.status }}';
            const emoji = '${{ steps.analyze.outputs.emoji }}';
            const desc = '${{ steps.analyze.outputs.desc }}';
            const allowMerge = '${{ steps.analyze.outputs.allow_merge }}';
            
            let vibe = '';
            let nextMove = '';
            
            if (score < 5) {
              vibe = '這程式碼優雅得像首詩，Reviewer 可以安心喝茶了。';
              nextMove = '繼續保持，甚至可以申請當開源專案範本。';
            } else if (score < 15) {
              vibe = '程式碼有點小脾氣，但還在可控範圍內。';
              nextMove = '順手修修風格問題，不著急。';
            } else if (score < 25) {
              vibe = '程式碼開始有自己的想法了，需要適當管教。';
              nextMove = '建議下次迭代時順便理理邏輯。';
            } else if (score < 40) {
              vibe = '讀起來需要一點勇氣，但還沒到勸退地步。';
              nextMove = '建議安排個技術債務清理日。';
            } else if (score < 55) {
              if (score < 45) {
                vibe = '能跑，但別問為什麼能跑。問就是玄學。';
                nextMove = '建議趁還沒成為名勝古蹟之前優化一下。';
              } else if (score < 50) {
                vibe = '開窗已經沒用了，建議佩戴心理防毒面具。';
                nextMove = '重構計劃該提上日程了，否則下一個接手的人會想找你聊天。';
              } else {
                vibe = '這程式碼有它自己的堅持，建議別惹它生氣。';
                nextMove = '做功能前先祈禱，改一行測試十遍。';
              }
            } else if (score < 65) {
              vibe = '維護這段程式碼需要額外的心理建設。';
              nextMove = '考慮一下：重構 vs 重寫 vs 辭職。';
            } else if (score < 75) {
              vibe = '程式碼已成遺跡，建議請考古學家來維護。';
              nextMove = '別想著優化了，能不動就不動，活著最重要。';
            } else if (score < 85) {
              vibe = '每次提交都是一場冒險，建議購買保險。';
              nextMove = '建議把這段程式碼供起來，重寫比修復划算。';
            } else if (score < 95) {
              vibe = '這不是程式碼，這是行為藝術。';
              nextMove = '建議截圖留念，然後考慮重新投胎（或者重寫）。';
            } else if (score < 100) {
              vibe = '這段程式碼已經死了，只是還沒埋。';
              nextMove = '立個墓碑，寫上前人教訓，然後 rm -rf。';
            } else {
              vibe = '登峰造極，史無前例，建議申遺。';
              nextMove = '刪庫跑路是最佳選擇，或者轉行賣蔥油餅。';
            }
            
            const mergeBadge = allowMerge === 'true' 
              ? '![允許合併](https://img.shields.io/badge/合併建議-允許-brightgreen)'
              : '![禁止合併](https://img.shields.io/badge/合併建議-禁止-red)';
            
            const body = '## ' + emoji + ' 屎山程式碼偵測報告 ' + mergeBadge + '\n\n' +
              '🎯 **本次偵測概覽**\n\n' +
              '> 「' + desc + '」\n\n' +
              '| 維度 | 資料 |\n' +
              '|:------|:------|\n' +
              '| **屎山指數** | `' + score.toFixed(2) + ' / 100` |\n' +
              '| **屎山等級** | **' + status + '** |\n' +
              '| **偵測時間** | ' + new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }) + ' |\n\n' +
              '### 🎭 整體印象\n' +
              vibe + '\n\n' +
              '### 🧭 下一步\n' +
              nextMove + '\n\n' +
              '---\n\n' +
              '**📥 詳細資料**\n' +
              '- [查看完整分析報告](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n' +
              '- [下載 Markdown 報告](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)\n\n' +
              '*由 [fuck-u-code](https://github.com/Done-0/fuck-u-code) 自動偵測 · 本評論不代表人類觀點*';

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('屎山程式碼偵測報告')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
      
      # 根據等級決定是否阻斷合併（可選）
      - name: 門禁檢查（可選）
        if: steps.analyze.outputs.allow_merge != 'true'
        run: |
          echo "❌ 屎山指數 ${{ steps.analyze.outputs.score }} 已達到「${{ steps.analyze.outputs.status }}」級別"
          echo "   ${{ steps.analyze.outputs.desc }}"
          echo "::error::程式碼品質未達標，建議重構後再合併"
          # 需要阻斷就取消下面這行的註解：
          # exit 1
