name: 🐍 程式碼格式與品質檢查

on:
  push:
    branches: [ main, master, dev/* ]
  pull_request:
    branches: [ main, master ]

jobs:
  ruff-check:
    name: Ruff 程式碼檢查
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v6

      - name: 設定 Python 環境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安裝 uv
        run: pip install uv

      - name: 執行 Ruff 格式化與修復
        id: ruff
        # 使用 || true 確保即使有錯誤也不立即中斷，以便後續步驟生成報告
        run: |
          echo "Running ruff format..."
          FORMAT_LOG=$(uvx ruff@0.15.1 format . 2>&1 || true)
          echo "$FORMAT_LOG"
          
          echo "Running ruff check --fix..."
          CHECK_LOG=$(uvx ruff@0.15.1 check --fix . 2>&1 || true)
          echo "$CHECK_LOG"
          
          # 將日誌儲存到檔案供後續腳本讀取
          echo "$FORMAT_LOG" > format.log
          echo "$CHECK_LOG" > check.log

      - name: 生成報告與評論
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            
            const formatLog = fs.readFileSync('format.log', 'utf8');
            const checkLog = fs.readFileSync('check.log', 'utf8');
            
            // --- 解析格式化日誌 ---
            const formatMatch = formatLog.match(/(\d+) file(s)? reformatted/);
            const reformattedCount = formatMatch ? parseInt(formatMatch[1]) : 0;
            
            const unchangedMatch = formatLog.match(/(\d+) file(s)? left unchanged/);
            const unchangedCount = unchangedMatch ? parseInt(unchangedMatch[1]) : 0;
            
            // --- 解析檢查日誌 ---
            let fixedCount = 0;
            let remainingCount = 0;
            let totalErrors = 0;
            
            const errorMatch = checkLog.match(/Found (\d+) error/);
            if (errorMatch) {
                totalErrors = parseInt(errorMatch[1]);
                
                const fixedMatch = checkLog.match(/\((\d+) fixed/);
                if (fixedMatch) fixedCount = parseInt(fixedMatch[1]);
                
                const remainingMatch = checkLog.match(/, (\d+) remaining\)/);
                if (remainingMatch) {
                    remainingCount = parseInt(remainingMatch[1]);
                } else {
                    if (fixedCount === 0) remainingCount = totalErrors;
                }
            }
            
            // --- 構建報告內容 ---
            let summary = '';
            let isSuccess = (reformattedCount === 0 && remainingCount === 0);
            
            if (isSuccess) {
                summary = '### ✅ All checks passed!';
            } else {
                summary = '### ⚠️ 程式碼品質檢查報告\n\n';
                summary += '> 發現部分檔案需要格式化或存在程式碼問題，建議在本地執行 `ruff format .` 和 `ruff check --fix .`。\n\n';
                
                if (reformattedCount > 0) {
                    summary += `**🖌️ 格式化**：\`${reformattedCount}\` 個檔案被重新格式化（未變更：${unchangedCount}）\n`;
                } else {
                    summary += `**🖌️ 格式化**：✅ 無需變更\n`;
                }
                
                if (totalErrors > 0) {
                    summary += `**🛡️ 程式碼檢查**：發現 \`${totalErrors}\` 個問題\n`;
                    summary += `- 🛠️ 已自動修復：\`${fixedCount}\`\n`;
                    summary += `- ❌ 剩餘未修復：\`${remainingCount}\`\n`;
                } else {
                    summary += `**🛡️ 程式碼檢查**：✅ 通過\n`;
                }
                
                if (remainingCount > 0) {
                    const logPreview = checkLog.length > 2000 ? checkLog.substring(0, 2000) + '\n...（日誌過長已截斷）' : checkLog;
                    summary += `\n<details><summary>🔍 錯誤詳情</summary>\n\n\`\`\`text${logPreview}\n\n\`\`\`\n</details>`;
                }
            }
            
            // --- 輸出到 Job Summary ---
            await core.summary.addRaw(summary).write();
            
            // --- PR 評論（僅在 PR 事件觸發時） ---
            if (context.eventName === 'pull_request') {
                const issue_number = context.issue.number;
                const owner = context.repo.owner;
                const repo = context.repo.repo;
                
                const comments = await github.rest.issues.listComments({
                    owner,
                    repo,
                    issue_number,
                });
                
                const botComment = comments.data.find(comment =>
                    comment.user.type === 'Bot' &&
                    (comment.body.includes('程式碼品質檢查報告') || comment.body.includes('All checks passed'))
                );
                
                if (botComment) {
                    await github.rest.issues.updateComment({
                        owner,
                        repo,
                        comment_id: botComment.id,
                        body: summary
                    });
                } else {
                    if (!isSuccess) {
                        await github.rest.issues.createComment({
                            owner,
                            repo,
                            issue_number,
                            body: summary
                        });
                    }
                }
            }
            
            // --- 設定 Job 狀態 ---
            if (!isSuccess) {
                core.setFailed('程式碼格式或品質檢測未通過，請檢查報告。');
            }
